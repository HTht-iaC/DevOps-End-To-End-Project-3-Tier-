apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backendcontainer
        image: 141005622229.dkr.ecr.us-east-1.amazonaws.com/prj-back-image:latest
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "terraform-20260208041154994200000001.c8zg4c8eclx3.us-east-1.rds.amazonaws.com"
        - name: DB_NAME
          value: "htht"
        - name: DB_USER
          value: "htht"
        - name: DB_PASS
          value: "hthtljlj"
